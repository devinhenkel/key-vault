services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-keycatalog}
      POSTGRES_USER: ${POSTGRES_USER:-keycatalog}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-keycatalog_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-keycatalog} -d ${POSTGRES_DB:-keycatalog}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${PORT:-3001}:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: "postgresql://${POSTGRES_USER:-keycatalog}:${POSTGRES_PASSWORD:-keycatalog_dev}@db:5432/${POSTGRES_DB:-keycatalog}?schema=public"
      ENCRYPTION_SECRET: ${ENCRYPTION_SECRET}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata: